name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}

      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig

      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools

      - name: "🌟 Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo $toolchains_num
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            echo "$(pwd)/$name/" >> $GITHUB_PATH
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

          echo "PATH Variable: $PATH"

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          THREAD: $(nproc --all)
        run: |
          echo "PATH Variable: $PATH"
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")
          CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")
          AR=$(echo $params | jq -r ".AR")
          CC=$(echo $params | jq -r ".CC")

          echo "ARCH=$ARCH" >> $GITHUB_ENV

          args="-j2"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p $(pwd)/${{ env.OUT_DIR }}
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CROSS_COMPILE" ]; then
            args="$args CROSS_COMPILE=$CROSS_COMPILE"
          fi
          if [ -n "$CLANG_TRIPLE" ]; then
            args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          fi
          if [ -n "$CROSS_COMPILE_COMPAT" ]; then
            args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_COMPAT"
          fi
          if [ -n "$AR" ]; then
            args="$args AR=$AR"
          fi
          if [ -n "$CC" ]; then
            args="$args CC=$CC"
          fi
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
                # 1. Limpieza y descarga de KernelSU
                [ -d "./KernelSU" ] && rm -rf "./KernelSU"
                [ -d "./drivers/kernelsu" ] && rm -rf "./drivers/kernelsu"
                curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
      
                # 2. IMPORTANTE: Escribimos los configs en el fragmento de ZEUS, no en el general
                # Usamos la ruta completa al archivo que vimos en tu captura de pantalla
                CONFIG_PATH="./arch/arm64/configs/vendor/zeus_GKI.config"
                
                echo -e "\nCONFIG_KPROBES=y" >> $CONFIG_PATH
                echo -e "\nCONFIG_HAVE_KPROBES=y" >> $CONFIG_PATH
                echo -e "\nCONFIG_KPROBE_EVENTS=y" >> $CONFIG_PATH
                
                echo "Configuración aplicada a $CONFIG_PATH:"
                tail -n 5 $CONFIG_PATH

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          # Aquí es donde ocurre la magia: Kbuild une ambos archivos
          # gki_defconfig (Base Google) + zeus_GKI.config (Drivers Xiaomi + KSU)
          make ${{ env.args }} gki_defconfig vendor/zeus_GKI.config

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          # Usamos la variable de entorno 'args' que definimos arriba
          make $args

      - name: "📦 Repack Boot Image (GKI Method)"
        working-directory: ./${{ env.kernelDir }}
        run: |
          # 1. Definir rutas
          IMAGE_SOURCE="$GITHUB_WORKSPACE/${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image"
          
          # 2. Descargar Magiskboot estático (fuente de confianza)
          # Usamos un repositorio de herramientas de sistema para evitar el 404 de osm0sis
          curl -L https://github.com/miz_vlad/magiskboot-static/raw/main/magiskboot -o magiskboot
          chmod +x magiskboot
          
          # 3. Descargar el boot original
          curl -L "https://github.com/${{ github.repository }}/releases/download/base-images/boot-original-lineage-23.2-20260317.img" -o boot-old.img
          
          # 4. Desempaquetar con Magiskboot (soporta Header v4)
          echo "🔎 Desempaquetando boot original..."
          ./magiskboot unpack boot-old.img
          
          # 5. Reemplazar el kernel
          # Magiskboot genera un archivo llamado 'kernel' al desempaquetar
          if [ -f "$IMAGE_SOURCE" ]; then
            echo "✅ Reemplazando kernel con la nueva compilación..."
            cp -f "$IMAGE_SOURCE" kernel
          else
            echo "❌ ERROR: No se encontró el kernel compilado en $IMAGE_SOURCE"
            exit 1
          fi
          
          # 6. Reempaquetar
          echo "🚀 Reempaquetando boot image..."
          ./magiskboot repack boot-old.img boot-custom-zeus.img
          
          # 7. Mover resultado a la raíz para el artifact
          if [ -f "boot-custom-zeus.img" ]; then
            mv boot-custom-zeus.img $GITHUB_WORKSPACE/boot-custom-zeus.img
            echo "✅ ¡HECHO! Boot GKI generado correctamente."
          else
            # Magiskboot a veces genera 'new-boot.img' por defecto
            if [ -f "new-boot.img" ]; then
              mv new-boot.img $GITHUB_WORKSPACE/boot-custom-zeus.img
              echo "✅ ¡HECHO! Boot GKI generado (new-boot.img)."
            else
              echo "❌ ERROR: Falló el reempaquetado."
              exit 1
            fi
          fi
          
      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7

      - name: "🚀 Upload Final Flashable Boot"
        uses: actions/upload-artifact@v4
        with:
          name: Boot-KernelSU-Zeus
          path: boot-custom-zeus.img
          retention-days: 7
